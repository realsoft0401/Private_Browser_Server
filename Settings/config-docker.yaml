server:
  host: 0.0.0.0
  port: 3400
  read_timeout_seconds: 15
  write_timeout_seconds: 30

sqlite:
  path: data/private_browser_server.db
  max_open_conns: 1
  max_idle_conns: 1

edge:
  request_timeout_seconds: 20
  api_key: private-browser-edge-key

discovery:
  enabled: true
  listen_address: 0.0.0.0
  port: 43000
  magic: PRIVATE_BROWSER_CLIENT_DISCOVERY
  protocol_version: 1
  group: default

node_health:
  monitor_interval_seconds: 15
  offline_after_seconds: 90
