name: private-browser-server
mode: prod
version: 0.1.0

server:
  host: 0.0.0.0
  port: 3400
  read_timeout_seconds: 15
  # run 可能同步等待 Edge pull-image 终态，写超时必须覆盖长镜像拉取。
  write_timeout_seconds: 720

sqlite:
  path: data/private_browser_server.db
  max_open_conns: 1
  max_idle_conns: 1

jwt:
  secret: change-me-before-prod
  expire_hours: 24
  issuer: private-browser-server
  allow_weak_secret: false

edge:
  request_timeout_seconds: 20
  retry_times: 0

task:
  refresh_interval_seconds: 5
  stale_seconds: 60

discovery:
  enabled: true
  listen_address: 0.0.0.0
  port: 43000
  magic: PRIVATE_BROWSER_CLIENT_DISCOVERY
  protocol_version: 1
  group: default
  max_packet_bytes: 8192
