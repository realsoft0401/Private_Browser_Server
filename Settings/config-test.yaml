name: private-browser-server
mode: test
version: 0.1.0

server:
  host: 127.0.0.1
  port: 18080
  read_timeout_seconds: 10
  write_timeout_seconds: 10

mysql:
  host: 127.0.0.1
  port: 3306
  database: private_browser_server_test
  username: root
  password: ""
  max_open_conns: 5
  max_idle_conns: 2

jwt:
  secret: test-only-change-me
  expire_hours: 1
  issuer: private-browser-server
  allow_weak_secret: true

edge:
  request_timeout_seconds: 5
  retry_times: 0

task:
  refresh_interval_seconds: 3
  stale_seconds: 30
