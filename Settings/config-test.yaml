name: private-browser-server
mode: test
version: 0.1.0

server:
  host: 127.0.0.1
  port: 3400
  read_timeout_seconds: 10
  write_timeout_seconds: 10

sqlite:
  path: data/private_browser_server_test.db
  max_open_conns: 1
  max_idle_conns: 1

jwt:
  secret: test-only-change-me
  expire_hours: 1
  issuer: private-browser-server
  allow_weak_secret: true

edge:
  request_timeout_seconds: 5
  retry_times: 0

task:
  refresh_interval_seconds: 3
  stale_seconds: 30

discovery:
  enabled: true
  listen_address: 0.0.0.0
  port: 43000
  magic: PRIVATE_BROWSER_CLIENT_DISCOVERY
  protocol_version: 1
  group: default
  max_packet_bytes: 8192
