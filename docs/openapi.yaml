                      taskType: browser_env_run
                      resourceType: browser_env
                      resourceId: '906090001_tk_324867594169356288'
                      eventsUrl: /api/v1/server-tasks/server-task-1782800001001/events
                invalid_body:
                  value:
                    code: 1002
                    message: browser-env run request body 非法，请检查 slotId
                invalid_params:
                  value:
                    code: 1002
                    message: 'invalid browser-env run params: envId 和 slotId 不能为空'
                env_not_found:
                  value:
                    code: 1004
                    message: server browser env not found
                remote_failed:
                  value:
                    code: 1005
                    message: edge client not found
  /api/v1/browser-envs/{envId}/stop:
    post:
      tags: [BrowserEnvs]
      summary: Stop browser env from Node Server
      description: |
        同步 stop 接口。发起后会直接等待目标 Edge stop 完成，并把停止后的 env 摘要重新同步回中心缓存。

        这条接口当前负责：
        - 读取 `server_browser_envs` 聚合记录
        - 校验目标节点当前 `healthy + verified`
        - 透传正式 `timeoutSeconds` 给目标 Edge stop
        - 创建一条 `server_tasks` 审计事实
        - 把停止后的 env 摘要重新同步回中心

        SSE 说明：
        - 本接口不使用 SSE
        - 原因：当前 stop 是短链路同步动作，普通 HTTP 足够表达最终结果
      parameters:
        - $ref: '#/components/parameters/EnvID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopBrowserEnvRequest'
            examples:
              default:
                value:
                  timeoutSeconds: 10
      responses:
        '200':
          description: Browser env stopped
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseBrowserEnvStop'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      envId: '906090001_tk_324867594169356288'
                      status: stopped
                      containerStatus: missing
                      stoppedAt: 1782793527
                invalid_body:
                  value:
                    code: 1002
                    message: browser-env stop request body 非法，请检查 timeoutSeconds
                env_not_found:
                  value:
                    code: 1004
                    message: server browser env not found
                remote_failed:
                  value:
                    code: 1005
                    message: edge client is not healthy and verified
  /api/v1/browser-envs/{envId}/runtime-image:
    patch:
      tags: [BrowserEnvs]
      summary: Update browser env runtime image from Node Server
      description: |
        同步 runtime-image 接口。发起后由 Node 校验中心 env 和目标节点，再调用目标 Edge 修改该 env 后续 run 使用的 `runtime.image`。

        这条接口当前负责：
        - 读取 `server_browser_envs` 聚合记录
        - 校验目标节点当前 `healthy + verified`
        - 校验 env 处于 created 或 stopped 状态
        - 调用目标 Edge 正式 `PATCH /api/v1/edge/browser-envs/{envId}/runtime-image`
        - 回写中心 env 最近同步时间和错误摘要

        业务边界：
        - 不自动 run
        - 不自动 pull image
        - 不自动 reinit slot
        - 不修改 slot 当前实际 `runtimeImage`
        - `created` 表示首次运行前配置态；`stopped` 表示运行后已与 slot/container 彻底隔离的干净态

        SSE 说明：
