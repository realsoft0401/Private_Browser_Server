        discoveryGroup:
          type: string
          description: 当前发现域分组
          example: default
        clientIp:
          type: string
          description: Client 自报的对外接入 IP
          example: 192.168.10.220
        baseUrl:
          type: string
          description: Client 自报的 3300 Edge HTTP 入口
          example: http://192.168.10.220:3300
        hostname:
          type: string
          description: Client 自报的宿主机名
          example: liningdeMacBook-Air.local
        lastHeartbeatAt:
          type: integer
          format: int64
          description: Client 自报的当前 heartbeat 时间
          example: 1781613551
