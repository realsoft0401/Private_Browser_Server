    CreateEnvRuntimeRequest:
      type: object
      description: >
        普通前端或用户不应随意拼装镜像字符串；imagePolicy 应由 Platform 或中心管理服务受控下发。
        当前过渡阶段，Platform 先直接给出已登记镜像字符串；Node Server 仍会校验该值是否属于受控策略。
        imagePolicy 传空字符串或 stable 时按默认稳定策略处理；当前 verified amd64 节点默认会解析到
        crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-amd64。
      properties:
        imagePolicy:
          type: string
          example: "crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-amd64"
          description: >
            Platform 当前下发的受控 imagePolicy 值。过渡阶段该值暂时直接等于已登记镜像字符串。
            verified amd64 节点当前推荐值为
            crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-amd64。
        startupUrl:
          type: string
          example: "https://www.tiktok.com/"
        shmSize:
          type: string
          example: "1gb"
    CreateEnvEnvironment:
      type: object
      required: [timezone, language, screen]
      properties:
        timezone:
          type: string
          example: "Asia/Shanghai"
        language:
          type: string
          example: "zh-CN"
        screen:
          $ref: "#/components/schemas/CreateEnvScreen"
    CreateEnvScreen:
      type: object
      required: [width, height, depth]
      properties:
        width:
          type: integer
          example: 1440
        height:
          type: integer
          example: 900
        depth:
          type: integer
          example: 24
    CreateEnvProxyRequest:
      type: object
      description: >
        代理配置会原样转发给 Edge；Node Server 不解码、不保存代理 YAML 明文。
        当 enabled=true 时，必须提供完整 configBase64。
      properties:
        enabled:
          type: boolean
          nullable: true
          example: true
        type:
          type: string
          example: "clash-verge"
        mode:
          type: string
          example: "rule"
        configBase64:
          type: string
          example: ""
    CreateEnvMetadataRequest:
      type: object
      description: 只保存环境包说明类字段，不参与身份和镜像判断。
      properties:
        source:
          type: string
          example: "platform-ui"
        description:
          type: string
          example: "TikTok 主账号专用环境"
    CreateEnvRequest:
      type: object
      required: [clientId, name, rpaType, environment]
      description: >
        Node Server 创建环境包请求。
        真正发给 Edge 的 userId 固定取 X-Main-Account-Id，避免子账号把 envId 第一段变成错误归属。
        rpaType 支持传 tiktok/facebook/instagram/youtube/twitter 这类业务别名，Node Server 会在下发 Edge 前归一化成 tk/fb/ins/yt/x。
        当前 Swagger 示例按 verified amd64 节点准备，imagePolicy 由 Platform 受控给出；
        过渡阶段该值先直接传已登记镜像字符串，Node Server 校验通过后会下发同一条 runtime.image，
        当前 amd64 稳定值为 crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-amd64。
      example:
        clientId: "9060900010001"
        name: "TikTok 主账号环境"
        rpaType: "tiktok"
        runtime:
          imagePolicy: "crpi-6s60spbjvluac8j8.cn-shanghai.personal.cr.aliyuncs.com/ln0216/private_browser_edge:1.1-amd64"
          startupUrl: "https://www.tiktok.com/"
          shmSize: "1gb"
        environment:
          timezone: "Asia/Shanghai"
          language: "zh-CN"
          screen:
            width: 1440
            height: 900
            depth: 24
        proxy:
          enabled: true
          type: "clash-verge"
          mode: "rule"
          configBase64: ""
        metadata:
          source: "platform-ui"
          description: "当前 amd64 默认镜像值由 Platform 下发，代理示例保留完整字段"
      properties:
        clientId:
          type: string
          example: "9060900010001"
        name:
          type: string
          example: "TikTok 主账号环境"
        rpaType:
          type: string
          example: "tiktok"
          description: >
            平台业务类型。Node Server 接受 tiktok/facebook/instagram/youtube/twitter 这类别名，
            下发 Edge 前会归一化成 tk/fb/ins/yt/x/other；真正返回到列表/详情里的通常是归一化后的短码。
        runtime:
          $ref: "#/components/schemas/CreateEnvRuntimeRequest"
        environment:
          $ref: "#/components/schemas/CreateEnvEnvironment"
        proxy:
          $ref: "#/components/schemas/CreateEnvProxyRequest"
        fingerprint:
          type: object
          additionalProperties: true
          description: 透传给 Edge 的指纹配置原始 JSON，Node Server 当前不解析、不保存 raw。
          example:
            platform: "Win32"
            browserVersion: "136"
        metadata:
          $ref: "#/components/schemas/CreateEnvMetadataRequest"
    ServerBrowserEnv:
      type: object
      description: >
        Node Server 保存的环境包中心缓存。
        它只保存归属、状态、连接入口和审计摘要，不保存 profile、代理明文、fingerprint raw 或 browser-data/profile。
      properties:
        envId:
          type: string
          example: "906090001_tk_1781223344556677888"
        mainAccountId:
          type: string
          example: "906090001"
        clientId:
          type: string
          example: "9060900010001"
        rpaType:
          type: string
          example: "tk"
        name:
          type: string
          example: "TikTok 主账号环境"
        status:
          type: string
          enum: [created, running, stopped, backed_up, deleted, archived, error]
          example: "created"
        containerStatus:
          type: string
          example: "unknown"
          description: Docker 运行摘要；创建后尚未 run 时保留 unknown。
        monitorStatus:
          type: string
          example: "unknown"
          description: 后台同步健康摘要；创建后尚未 run 时保留 unknown。
        cdpUrl:
          type: string
          example: "http://192.168.10.119:8101"
        webVncUrl:
          type: string
          example: "http://192.168.10.119:3300/web-vnc.html?envId=906090001_tk_1781223344556677888"
        lastTaskId:
          type: string
          example: ""
        lastError:
          type: string
          example: ""
        createdByUserId:
          type: string
          example: "user_1780995561009325000_000001"
        createdByUsername:
          type: string
          example: "user_906090001"
        createdAt:
          type: integer
          example: 1781223344
        updatedAt:
          type: integer
          example: 1781223344
        deletedAt:
          type: integer
          example: 0
    CreateEnvResponse:
      type: object
      description: 创建成功后的统一摘要，兼顾本次 Edge 返回值和中心缓存记录。
      properties:
