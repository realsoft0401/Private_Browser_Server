  /api/v1/server-tasks:
    get:
      tags: [ServerTasks]
      summary: List server tasks
      description: |
        查询 Node Server 持久化任务列表，用于管理员查看最近生命周期动作、失败任务和任务审计摘要。

        这不是 SSE 接口，只读取 `server_tasks` 主记录；如果要观察某一个任务的多阶段过程，
        应继续使用 `GET /api/v1/server-tasks/{taskId}/events`。

        SSE 说明：
        - 当前接口不使用 SSE，因为列表查询可以同步返回明确结果
        - 返回的每条任务会包含 `eventsUrl`
        - 如需查看单个任务过程，再订阅对应 `eventsUrl`
      parameters:
        - name: clientId
          in: query
          required: false
          description: 按中心 Client 身份过滤任务
          schema:
            type: string
          example: '9060901190003'
        - name: envId
          in: query
          required: false
          description: 按环境包 ID 过滤任务
          schema:
            type: string
          example: '906090001_tk_324867594169356288'
        - name: resourceId
          in: query
          required: false
          description: 按任务资源 ID 过滤；browser-env 任务通常等于 envId，节点治理任务通常等于 clientId
          schema:
            type: string
          example: '906090001_tk_324867594169356288'
        - name: taskType
          in: query
          required: false
          description: 按任务类型过滤
          schema:
            type: string
          example: browser_env_run
        - name: status
          in: query
          required: false
          description: 按任务状态过滤
          schema:
            type: string
            enum: [pending, running, success, failed]
          example: failed
        - name: page
          in: query
          required: false
          description: 页码，默认 1
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: pageSize
          in: query
          required: false
          description: 每页数量，默认 20，最大 100
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        '200':
          description: Server task list
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseServerTaskList'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      items:
                        - taskId: server-task-1782800001001
                          taskType: browser_env_run
                          resourceType: browser_env
                          resourceId: '906090001_tk_324867594169356288'
                          status: success
                          currentStage: ''
                          message: ''
                          eventsUrl: /api/v1/server-tasks/server-task-1782800001001/events
                          createdAt: '2026-06-30T10:00:00+08:00'
                          updatedAt: '2026-06-30T10:00:20+08:00'
                          finishedAt: '2026-06-30T10:00:20+08:00'
                          error: ''
                          suggestion: ''
                      total: 1
                      page: 1
                      pageSize: 20
                invalid_runtime:
                  value:
                    code: 1005
                    message: query server_tasks list failed
  /api/v1/server-tasks/{taskId}:
    get:
      tags: [ServerTasks]
      summary: Get server task detail
      description: |
        查询当前 Node Server 进程内 server task 的摘要。

        这不是 SSE 接口；如果任务仍在执行中，调用方仍应继续订阅
        `/api/v1/server-tasks/{taskId}/events`。
      parameters:
        - $ref: '#/components/parameters/TaskID'
      responses:
        '200':
          description: Server task detail
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseServerTaskDetail'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      taskId: server-task-1782800001001
                      taskType: browser_env_run
                      resourceType: browser_env
                      resourceId: '906090001_tk_324867594169356288'
                      status: running
                      currentStage: dispatch_edge_run
                      message: run admission passed, dispatching edge run
                      eventsUrl: /api/v1/server-tasks/server-task-1782800001001/events
                      createdAt: '2026-06-30T10:00:00+08:00'
                      updatedAt: '2026-06-30T10:00:03+08:00'
                      finishedAt: ''
                      error: ''
                      suggestion: ''
                not_found:
                  value:
                    code: 1004
                    message: server task not found
  /api/v1/server-tasks/{taskId}/events:
    get:
      tags: [ServerTasks]
      summary: Subscribe server task SSE events (SSE)
      description: |
        SSE 事件流接口，返回 `text/event-stream`。

        只要某个中心业务接口说明“立即返回 `taskId/eventsUrl`”，调用方就应该通过这条统一入口
        继续订阅任务过程，而不是把接单响应误解成最终结果。

        当前事件流会先补发该任务已记录的历史事件，再继续推送后续事件；
        典型事件包括 `task.progress`、`task.completed`、`task.failed`。
      parameters:
        - $ref: '#/components/parameters/TaskID'
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
