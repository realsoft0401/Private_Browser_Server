components:
  parameters:
    ClientID:
      name: clientId
      in: path
      required: true
      description: 中心节点唯一身份，由 3400 Server 生成
      schema:
        type: string
      example: 9060901190001
    AccountIDQuery:
      name: accountId
      in: query
      required: true
      description: 当前主账号 ID，对外仍叫 accountId，数据库内部统一映射为 main_account_id
      schema:
        type: string
      example: '906090119'
    EnvID:
      name: envId
      in: path
      required: true
      description: 中心 browser-env 唯一标识，格式固定为 `userId_rpaType_snowflakeId`
      schema:
        type: string
      example: 906090001_tk_324867594169356288
    TaskID:
      name: taskId
      in: path
      required: true
      description: 中心 server task ID
      schema:
        type: string
      example: server-task-1782800001001
  schemas:
    ApiResponseBase:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          format: int64
          description: 业务结果码。当前 3400 统一使用 HTTP 200，成功或失败都由这个字段表达。
          example: 1000
        message:
          type: string
          description: 人可读业务消息。联调和排障时优先看这里。
          example: success
    ApiErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
      description: 统一错误响应包裹
