                    code: 1005
                    message: 环境包当前状态为 running，只有 created 或 stopped 状态才允许修改 runtime.image
  /api/v1/browser-envs/{envId}/backup:
    post:
      tags: [BrowserEnvs]
      summary: Backup browser env from Node Server (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台把 backup 转发给目标 Edge，
        再由中心继续收口最终成功或失败。

        这条接口当前负责：
        - 读取 `server_browser_envs` 聚合记录
        - 校验目标节点当前 `healthy + verified`
        - 创建 `server_tasks`
        - 调用目标 Edge 正式 backup 接口
        - 通过中心 SSE 收口 Edge backup 过程和终态

        这条接口不是同步最终结果接口。调用方必须继续订阅
        `/api/v1/server-tasks/{taskId}/events`，观察 `task.progress`、`task.completed`、
        `task.failed` 事件，才能确认本次 backup 的最终结论。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      responses:
        '200':
          description: Task accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseTaskAccepted'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                accepted:
                  value:
                    code: 1000
                    message: success
                    data:
                      taskId: server-task-1782800002001
                      taskType: browser_env_backup
                      resourceType: browser_env
                      resourceId: '906090001_tk_324867594169356288'
                      eventsUrl: /api/v1/server-tasks/server-task-1782800002001/events
                env_not_found:
                  value:
                    code: 1004
                    message: server browser env not found
                remote_failed:
                  value:
                    code: 1005
                    message: edge client is not healthy and verified
