          example: 1781224455
    ServerTask:
      type: object
      description: >
        Node Server 的平台级任务事实。它把主账号、操作者、clientId、envId 和必要时的 edgeTaskId 串起来，
        作为长期查询、审计和跨节点联调的中心任务记录。像 backup、restore 这类同步 Edge 动作，中心 task 可以没有 edgeTaskId。
      properties:
        taskId:
          type: string
          example: "task_1781223344556677888"
        mainAccountId:
          type: string
          example: "906090001"
        operatorUserId:
          type: string
          example: "user_1780995561009325000_000001"
        operatorUsername:
          type: string
          example: "user_906090001"
        clientId:
          type: string
          example: "9060900010001"
        envId:
          type: string
          example: "906090001_tk_1781223344556677888"
        type:
          type: string
          enum: [create_env, run_env, stop_env, pull_image, backup_env, restore_env, revalidate_env, import_env_package, delete_env_package]
          example: "run_env"
          description: >
            当前已落库任务类型。现阶段真正会写入的主要是
            create_env、run_env、stop_env、backup_env、restore_env、revalidate_env、import_env_package、delete_env_package，run 过程中镜像预检还可能产生 pull_image 子任务。
        status:
          type: string
          enum: [pending, running, success, failed, canceled]
          example: "running"
          description: >
            当前实现实际会写入 pending/running/success/failed；canceled 先保留为后续扩展枚举。
        edgeTaskId:
          type: string
          example: "task_1770000000000000000_12345"
          description: >
            仅当 Node Server 需要绑定 Edge 短期任务时才会有值。像 `backup_env` 这类同步 Edge 动作，
            `restore_env` 这类同步 Edge 动作，以及 `import_env_package` 这类本地 task + 同步 Edge 动作，
            当前实现不会返回 edgeTaskId。
        eventsUrl:
          type: string
          description: 由当前 Node Server 请求 Host 生成的中心任务 SSE 地址。
          example: "http://node-server.internal:3400/api/v1/server/tasks/task_1781223344556677888/events"
        errorMessage:
          type: string
          example: ""
        createdAt:
          type: integer
          example: 1781223344
        updatedAt:
          type: integer
          example: 1781223345
        finishedAt:
          type: integer
          example: 1781223352
    EdgeTaskSnapshot:
      type: object
      description: 当前可读到的 Edge 短期任务快照，只做观察用途，不替代中心最终结论。
      properties:
        taskId:
          type: string
          example: "task_1770000000000000000_12345"
        taskType:
          type: string
          example: "browser_env_run"
        status:
          type: string
          example: "running"
        message:
          type: string
          example: "浏览器容器创建完成，开始等待 CDP"
        lastError:
          type: string
          example: ""
        result:
          type: object
          nullable: true
          additionalProperties: true
          example:
            envId: "906090001_tk_1781223344556677888"
            status: "running"
        createdAt:
          type: integer
          example: 1781223344
        updatedAt:
          type: integer
          example: 1781223345
        finishedAt:
          type: integer
          nullable: true
          example: 1781223352
    StartTaskResponse:
      type: object
      description: >
        中心任务摘要。大多数长动作会先返回 pending/running，再由前端继续查任务详情或订阅 SSE；
        但像 `backup_env`、`restore_env` 这类同步 Edge 动作，HTTP 200 返回时可能已经是最终 `success`。
        `import_env_package` 当前会先返回 pending，再由 Node Server 本地任务在后台同步等待 Edge 导入结果。
      properties:
        taskId:
          type: string
          example: "task_1781223344556677888"
        taskType:
          type: string
          enum: [create_env, run_env, stop_env, pull_image, backup_env, restore_env, revalidate_env, import_env_package, delete_env_package]
          example: "run_env"
          description: 返回给前端的启动任务类型字段；对应持久化任务详情里的 `task.type`。
        status:
          type: string
          enum: [pending, running, success, failed, canceled]
          example: "pending"
          description: 长动作创建时通常先返回 pending；最终结果需继续查询 task detail 或订阅 SSE。
        clientId:
          type: string
          example: "9060900010001"
        envId:
          type: string
          example: "906090001_tk_1781223344556677888"
        edgeTaskId:
          type: string
          example: "task_1770000000000000000_12345"
          description: >
            仅当该中心任务实际绑定了 Edge task 时才返回。`backup_env`、`restore_env`、`import_env_package` 当前不会返回该字段。
        eventsUrl:
          type: string
          description: 由当前 Node Server 请求 Host 生成的中心任务 SSE 地址。
          example: "http://node-server.internal:3400/api/v1/server/tasks/task_1781223344556677888/events"
        message:
          type: string
          example: "环境包启动任务已创建"
        createdAt:
          type: integer
          example: 1781223344
