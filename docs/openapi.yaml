        accountId:
          type: string
          description: 当前绑定账号
          example: '906090119'
        status:
          type: string
          description: 当前固定为 bound
          example: bound
        clientIp:
          type: string
          description: 本次绑定的目标 Client IP
          example: 192.168.10.220
        baseUrl:
          type: string
          description: 本次绑定探测出的 baseUrl
          example: http://192.168.10.220:3300
