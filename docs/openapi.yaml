          type: string
          example: "d03ce5c0b53d7c5216f74b78c1f5f22f0f4b30fd53b7fe8f7756e2a16ebc9450"
        cdpUrl:
          type: string
          example: "http://192.168.10.119:8101"
        webVncUrl:
          type: string
          example: "http://192.168.10.119:3300/web-vnc.html?envId=906090001_tk_1781223344556677888"
