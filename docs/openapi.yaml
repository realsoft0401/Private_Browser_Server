openapi: 3.0.3
info:
  title: Private Browser Server Phase 1 API
  version: 0.1.0-phase1
  description: |
    Private Browser Server Phase 1 正式接口文档。

    当前只覆盖 Node 侧的发现、绑定、推送、解绑和节点查询。
    这份文档的目标不是“接口能跑”，而是让联调、前端和平台同一口径对齐：

    - UDP beacon 是唯一正式发现链路
    - heartbeat 只证明已知节点仍在线，不承担发现职责
    - bind 由 `accountId + clientIp` 触发
    - bind 成功后由 Server 生成中心 `clientId`
    - push 负责把 `clientId/accountId/nodeServerBaseUrl` 写回 Client 本地 `node-registration.json`
    - 解绑只解除归属，不销毁历史身份
    - 对外请求体仍使用 `accountId`，对内数据库统一写入 `main_account_id`，不再保留旧兼容字段

    文档里的示例统一使用局域网地址和可读路径，避免再出现误导性的默认值。

    当前所有接口统一返回 HTTP 200，业务结果放在 `code/message/data` 中：

    - `1000` success
    - `1002` 请求参数错误
    - `1004` 数据不存在
    - `1005` 远端调用失败
    - `1500` 服务内部错误
servers:
  - url: /
    description: 当前打开 Swagger 或 Scalar 页面的 Server 服务入口
tags:
  - name: Health
    description: 服务健康检查
  - name: Discovery
    description: Client UDP 自动发现主链路
  - name: Binding
    description: 中心绑定与 Client 留痕写回
  - name: Nodes
    description: 已绑定节点查询
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: |
        返回 3400 Server 当前最小健康事实。

        这里只反映 Server 本机是否正常提供 API、SQLite、Swagger 能力，
        不表示某个具体 Client 节点是否 healthy。
      responses:
        '200':
          description: Health response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      ok: true
                      status: healthy
                      service: private-browser-server
                      mode: production
                      version: 0.1.0-phase1
                      configFile: /app/Settings/config-docker.yaml
                      checkedAt: 1781613551
                      checks:
                        api:
                          status: healthy
                          message: http 服务可响应
                        sqlite:
                          status: healthy
                          message: sqlite 已初始化
                        swagger:
                          status: healthy
                          message: swagger/openapi 入口已挂载
  /api/v1/edge-clients/discovered:
    get:
      tags: [Discovery]
      summary: List discovered clients
      description: |
        返回当前通过 UDP beacon 收到的 discovered 视图。

        这是“发现线索”，不是正式节点表：
        - `clientId=""` 表示发现到了 Client，但还未绑定
        - `clientId!= ""` 表示该发现项已经匹配到正式绑定节点

        当前 discovered 结果来自内存缓存，会自动过期，不落正式 SQLite 表。

        SSE 说明：
        - 本接口不使用 SSE
        - discovered 是查询接口，直接同步返回当前快照即可
      responses:
        '200':
          description: Discovered list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDiscoveredList'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      items:
                        - discoveryId: disc_1781613551275093000
                          clientId: '9060901190001'
                          accountId: '906090119'
                          status: discovered
                          clientIp: 192.168.10.220
                          baseUrl: http://192.168.10.220:3300
                          hostname: liningdeMacBook-Air.local
                          os: darwin
                          arch: arm64
                          dockerApiUrl: http://192.168.10.220:2375
                          healthStatus: healthy
                          discoveredAt: 1781613551
                          lastHeartbeatAt: 1781613551
                      total: 1
  /api/v1/edge-clients/heartbeat:
    post:
      tags: [Discovery]
      summary: Receive edge heartbeat
      description: |
        接收 3300 Client 主动上报的服务活性 heartbeat。

        这条接口只做三件事：
        - 校验 discovery 协议字段
        - 按 `baseUrl/clientIp` 匹配已知正式节点
        - 更新已知节点的 heartbeat 活性摘要

        当前口径下它不参与发现：
        - UDP beacon 是唯一正式发现链路
        - heartbeat 不能创建 discovered 来源，也不能把 discovered 升级成正式节点
        - 不能把“heartbeat 打到了”解释成“UDP 自动发现链路已经成立”

        它不会：
        - 自动落正式绑定节点
        - 自动生成 clientId
        - 自动把 discovered 升级成 verified

        SSE 说明：
        - 本接口不使用 SSE
        - heartbeat 是轻量活性上报，单次响应已足够表达接收结果
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatRequest'
            examples:
              default:
                value:
                  discoveryMagic: PRIVATE_BROWSER_CLIENT_DISCOVERY
                  protocolVersion: 1
                  service: private-browser-client
                  discoveryGroup: default
                  clientIp: 192.168.10.220
                  baseUrl: http://192.168.10.220:3300
                  hostname: liningdeMacBook-Air.local
                  lastHeartbeatAt: 1781613551
      responses:
        '200':
          description: Heartbeat accepted or rejected by business code
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseHeartbeat'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      received: true
                      source: heartbeat
                      participatesInDiscovery: false
                      knownNodeMatched: true
                      matchedClientId: '9060901190001'
                      matchedBy: baseUrl
                      clientIp: 192.168.10.220
                      baseUrl: http://192.168.10.220:3300
                      lastHeartbeatAt: 1781613551
                invalid_magic:
                  value:
                    code: 1002
                    message: discoveryMagic 不匹配当前 Node Server 发现域
                unmatched_known_node:
                  value:
                    code: 1000
                    message: success
                    data:
                      received: true
                      source: heartbeat
                      participatesInDiscovery: false
                      knownNodeMatched: false
                      matchedClientId: ''
                      matchedBy: ''
                      clientIp: 192.168.10.220
                      baseUrl: http://192.168.10.220:3300
                      lastHeartbeatAt: 1781613551
  /api/v1/edge-clients/bind:
    post:
      tags: [Binding]
      summary: Bind client by accountId and clientIp
      description: |
        按已定案的 `accountId + clientIp` 绑定 Client。

        说明：
        - `accountId` 是对外 API 字段
        - 数据库内部统一收口为 `main_account_id`
        - 这里不再保留旧 `account_id` 兼容字段

        执行顺序：
        1. 根据 `clientIp` 探测 3300 Client `/health`
        2. 探测 `/api/v1/edge/device-info`
        3. 探测 `/api/v1/edge/node-registration`，确认本地没有 `node-registration.json` 绑定锁
        4. 生成中心 `clientId`
        5. 写入正式绑定节点表
        6. 自动调用 3300 Client assign 接口下发 `clientId`

        关键规则：
        - 同一 Client 已被其它账号绑定时，必须拒绝重复绑定
        - Client 本地已有 `node-registration.json` 时，普通 bind 必须拒绝
        - 换 Node 必须先旧 Node unbind；旧 Node 不可用时由管理员手动登录 Client 机器删除本地注册文件后再重新 bind
        - 当前不提供 force bind 接口
        - bind 成功但 push 失败时，不回滚 bind，只返回 `pushStatus=failed`

        补充说明：
        - 这里的 assign / push 只属于 Node 发现 Client 后的正式写回链路
        - 它不改变“中心身份真相只在 Server”这一长期正式口径

        SSE 说明：
        - 本接口不使用 SSE
        - bind 是短链路同步动作，push 只是写回留痕，不需要事件流
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindRequest'
            examples:
              default:
                value:
                  accountId: '906090119'
                  clientIp: 192.168.10.220
      responses:
        '200':
          description: Bind success or business reject
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseBind'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190001'
                      accountId: '906090119'
                      status: bound
                      clientIp: 192.168.10.220
                      baseUrl: http://192.168.10.220:3300
                      bindStatus: success
                      pushStatus: success
                      node:
                        clientId: '9060901190001'
                        accountId: '906090119'
                        name: '9060901190001'
                        clientIp: 192.168.10.220
                        baseUrl: http://192.168.10.220:3300
                        dockerApiUrl: http://192.168.10.220:2375
                        os: darwin
                        arch: arm64
                        healthStatus: healthy
                        pushStatus: pending
                        createdAt: 1781612873
                        updatedAt: 1781612873
                invalid_body:
                  value:
                    code: 1002
                    message: bind request body 非法
                already_bound:
                  value:
                    code: 1005
                    message: 该 Client 已经绑定，无需重复绑定
                bound_by_other:
                  value:
                    code: 1005
                    message: 该 Client 已被其它账号绑定，请先解绑后再重新绑定
                registration_locked:
                  value:
                    code: 1005
                    message: 该 Client 已存在 node-registration.json，普通 bind 被拒绝；请先从旧 Node unbind 清理本地注册；旧 Node 不可用时由管理员手动删除 Client 本地注册文件后再重新 bind；currentNode=http://192.168.111.220:3400 clientId=9060901190003 accountId=906090119
  /api/v1/edge-clients/{clientId}/push-client-id:
    post:
      tags: [Binding]
      summary: Push clientId to client
      description: |
        对已绑定节点补推一次 clientId 到 3300 Client。

        适用场景：
        - bind 已成功，但第一次写回失败
        - 3300 Client 本地 `node-registration.json` 需要重新写回

        SSE 说明：
        - 本接口不使用 SSE
        - 这是一次性补推动作，成功失败都可同步收口
      parameters:
        - $ref: '#/components/parameters/ClientID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushClientIDRequest'
            examples:
              default:
                value:
                  accountId: '906090119'
                  nodeServerBaseUrl: http://192.168.10.119:3400
                  source: manual-repush
                  assignedAt: 1781613551
      responses:
        '200':
          description: Push result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponsePushClientID'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190001'
                      pushStatus: success
                      pushedAt: 1781613551
                invalid_body:
                  value:
                    code: 1002
                    message: push request body 非法
                client_not_found:
                  value:
                    code: 1004
                    message: edge client not found
  /api/v1/edge-clients/{clientId}/unbind:
    post:
      tags: [Binding]
      summary: Unbind client and clear local registration cache
      description: |
        正式解绑接口。

        执行顺序：
        1. Node Server 根据 `clientId` 读取中心已绑定节点
        2. 中心删除该节点当前有效绑定结果
        3. 保留历史审计，但不保留旧绑定结果作为当前有效身份
        4. 反向调用 3300 Client `POST /api/v1/edge/node-registration/clear`
        5. 清理 Client 本地 `node-registration.json` 留痕

        关键规则：
        - unbind 成功后，旧 `clientId` 不再继续作为当前有效绑定结果保留
        - 后续再次 bind 必须重新生成新的 `clientId`
        - 如果 Client 本地 clear 失败，不回滚中心 unbind
        - clear 失败会通过 `clearRegistrationStatus=failed` 明确返回

        SSE 说明：
        - 本接口不使用 SSE
        - 原因：unbind 是短链路中心治理动作，同步 HTTP 已足够表达中心解绑是否成功，
          本地清理结果也可直接在当前响应里收口

      # SSE 说明：
      # - 本接口不使用 SSE
      # - 解绑动作短、结果明确，继续用同步 HTTP 更容易联调和排障
      parameters:
        - $ref: '#/components/parameters/ClientID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnbindRequest'
            examples:
              default:
                value:
                  source: manual-unbind
      responses:
        '200':
          description: Unbind result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseUnbind'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190001'
                      accountId: '906090119'
                      status: unbound
                      clearRegistrationStatus: success
                      unboundAt: 1782218700
                clear_failed:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190001'
                      accountId: '906090119'
                      status: unbound
                      clearRegistrationStatus: failed
                      clearRegistrationMessage: 'request failed: Post "http://192.168.10.220:3300/api/v1/edge/node-registration/clear": context deadline exceeded'
                      unboundAt: 1782218700
                already_unbound:
                  value:
                    code: 1005
                    message: 该 Client 当前未绑定，无需解绑
                client_not_found:
                  value:
                    code: 1005
                    message: edge client not found
  /api/v1/edge-clients/{clientId}/recheck:
    post:
      tags: [Nodes]
      summary: Recheck edge client session
      description: |
        节点治理接口。

        当前业务语义名统一叫“会话校验”，技术接口名保持 `recheck`。

        执行顺序：
        1. Node Server 根据 `clientId` 读取当前正式节点
        2. 调用目标 Client `/health`
        3. 调用目标 Client `/api/v1/edge/device-info`
        4. 对比当前中心记录与最新设备事实
        5. 刷新 `health_status / discovery_status / discovery_reason / last_error / last_checked_at`

        关键规则：
        - `recheck` 只负责重新确认当前节点会话是否仍然有效
        - `recheck` 不重新 bind，不生成新的 `clientId`
        - `recheck` 不自动确认 IP 漂移
        - 如果发现事实冲突，应明确收口为 `ip_mismatch` 或 `identity_changed`

        SSE 说明：
        - 本接口不使用 SSE
        - 原因：第一版会话校验只是一轮同步重探测，同步 HTTP 已足够表达最终治理结果
      parameters:
        - $ref: '#/components/parameters/ClientID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecheckRequest'
            examples:
              default:
                value:
                  source: manual-recheck
      responses:
        '200':
          description: Recheck result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseRecheck'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success_verified:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190002'
                      status: rechecked
                      healthStatus: healthy
                      discoveryStatus: verified
                      discoveryReason: ''
                      checkedAt: 1782500001
                success_identity_changed:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190002'
                      status: rechecked
                      healthStatus: healthy
                      discoveryStatus: blocked
                      discoveryReason: identity_changed
                      checkedAt: 1782500001
                invalid_body:
                  value:
                    code: 1002
                    message: recheck request body 非法
                client_not_found:
                  value:
                    code: 1005
                    message: edge client not found
                probe_failed:
                  value:
                    code: 1005
                    message: 'recheck probe failed: GET http://192.168.111.119:3300/health: context deadline exceeded'
  /api/v1/edge-clients/{clientId}/confirm-address-update:
    post:
      tags: [Nodes]
      summary: Confirm address update for edge client
      description: |
        节点治理接口。

        这条接口用于在“会话校验 / recheck”已经发现 `ip_mismatch` 后，
        由管理员明确确认这仍然是同一台 Client，并把中心记录更新到新的 `clientIp / baseUrl`。

        执行顺序：
        1. Node Server 根据 `clientId` 读取当前正式节点
        2. 读取管理员提交的新 `clientIp / baseUrl`
        3. 对新地址执行 `/health`
        4. 对新地址执行 `/api/v1/edge/device-info`
        5. 校验设备事实是否仍匹配原节点
        6. 只有校验通过或形成明确治理结论后，才更新中心地址

        关键规则：
        - 必须先 `recheck` 发现问题，再人工发起 `confirm-address-update`
        - 这条接口不重新 bind，不生成新的 `clientId`
        - 这条接口不能跳过“新地址探测”直接改库
        - 如果新地址事实冲突，应收口为 `identity_changed`

        SSE 说明：
        - 本接口不使用 SSE
        - 原因：第一版地址确认更新仍是同步治理动作，同步 HTTP 足够表达最终结果
      parameters:
        - $ref: '#/components/parameters/ClientID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmAddressUpdateRequest'
            examples:
              default:
                value:
                  clientIp: 192.168.111.120
                  baseUrl: http://192.168.111.120:3300
                  source: manual-confirm-address-update
      responses:
        '200':
          description: Confirm address update result
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseConfirmAddressUpdate'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                success_verified:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190002'
                      oldClientIp: 192.168.111.119
                      newClientIp: 192.168.111.120
                      oldBaseUrl: http://192.168.111.119:3300
                      newBaseUrl: http://192.168.111.120:3300
                      healthStatus: healthy
                      discoveryStatus: verified
                      discoveryReason: ''
                      updatedAt: 1782501001
                success_identity_changed:
                  value:
                    code: 1000
                    message: success
                    data:
                      clientId: '9060901190002'
                      oldClientIp: 192.168.111.119
                      newClientIp: 192.168.111.120
                      oldBaseUrl: http://192.168.111.119:3300
                      newBaseUrl: http://192.168.111.120:3300
                      healthStatus: healthy
                      discoveryStatus: blocked
                      discoveryReason: identity_changed
                      updatedAt: 1782501001
                invalid_body:
                  value:
                    code: 1002
                    message: confirm-address-update request body 非法
                client_not_found:
                  value:
                    code: 1005
                    message: edge client not found
                probe_failed:
                  value:
                    code: 1005
                    message: 'confirm-address-update probe failed: GET http://192.168.111.120:3300/health: context deadline exceeded'
  /api/v1/edge-clients/{clientId}/slot-reconcile:
    post:
      tags: [Nodes]
      summary: Reconcile slot relations for edge client (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台按当前中心绑定关系
        拉取目标 Client 的正式 slot 明细，并重建 Node Server 当前缓存的 node-slot 关系。

        这条接口负责：
        1. 读取当前中心目标 slot 摘要
        2. 拉取 Client 当前正式 slot 明细
        3. 全量刷新 `edge_client_slots`
        4. 重算 `edge_clients` 上的 slot 摘要
        5. 输出 `slot 异常` 结论

        关键规则：
        - 不直接创建 Client 本机 slot
        - 不直接删除 Client 本机 slot
        - 不修改平台目标 slot 数
        - 不自动 run

        这条接口不是同步最终结果接口。调用方必须继续订阅
        `/api/v1/server-tasks/{taskId}/events`，观察 `task.progress`、`task.completed`、
        `task.failed` 事件，才能确认本次 slot 对账的最终结论。
      parameters:
        - $ref: '#/components/parameters/ClientID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotReconcileRequest'
            examples:
              default:
                value:
                  source: manual-slot-reconcile
      responses:
        '200':
          description: Task accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseTaskAccepted'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                accepted:
                  value:
                    code: 1000
                    message: success
                    data:
                      taskId: server-task-1782600001001
                      taskType: slot_reconcile
                      resourceType: edge_client
                      resourceId: '9060901190003'
                      eventsUrl: /api/v1/server-tasks/server-task-1782600001001/events
                invalid_body:
                  value:
                    code: 1002
                    message: slot-reconcile request body 非法
                client_not_found:
                  value:
                    code: 1005
                    message: edge client not found
                client_not_ready:
                  value:
                    code: 1005
                    message: edge client is not healthy and verified
  /api/v1/edge-clients/{clientId}/target-slot-count:
    post:
      tags: [Nodes]
      summary: Set target slot count for edge client
      description: |
        管理员手工更新中心 `target_slot_count`。

        这条接口当前是平台正式下发链路接入前的临时治理入口，只负责：
        - 更新 `edge_clients.target_slot_count`
        - 按当前 `actual_slot_count` 重新计算 `slot_exception_status`
        - 记录中心治理留痕

        它不负责：
        - 直接调用 Client 创建 slot
        - 直接调用 Client 删除 slot
        - 不自动触发 `slot-reconcile`

        SSE 说明：
        - 本接口不使用 SSE
        - 这是短链路中心治理动作，同步 HTTP 已足够表达结果
      parameters:
        - $ref: '#/components/parameters/ClientID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTargetSlotCountRequest'
