                    message: edge client is not healthy and verified
  /api/v1/browser-envs/import-package:
    post:
      tags: [BrowserEnvs]
      summary: Import browser env package on specified Client (SSE task)
      description: |
        把外部标准 tgz 环境包导入到指定 `clientId` 对应的 Edge Client。

        这是中心环境包进入 Node 主视图的第二个正式入口：
        - Node 接收 multipart `file`
        - Node 暂存上传包后转发给指定 Edge Client
        - Edge 负责解压、校验、重分配本机端口和写入本机 SQLite
        - Edge task 成功后，Node 回读 Edge detail 并写入 `server_browser_envs`

        SSE 说明：
        - 本接口使用 SSE
        - 发起接口本身返回 `application/json`，只表示中心任务接单成功
        - 调用方必须继续订阅 `data.eventsUrl`，即 `/api/v1/server-tasks/{taskId}/events`
        - 只有收到 `task.completed` 后，才能认为中心导入和缓存写入完成
        - SSE 中断后，应通过 `GET /api/v1/server-tasks/{taskId}` 查询终态
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportBrowserEnvPackageRequest'
      responses:
        '200':
          description: Import task accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseTaskAccepted'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                accepted:
                  value:
                    code: 1000
                    message: success
                    data:
                      taskId: server-task-1782800001001
                      taskType: browser_env_import_package
                      resourceType: browser_env
                      resourceId: ''
                      clientId: '9060901190003'
                      eventsUrl: /api/v1/server-tasks/server-task-1782800001001/events
                missing_client_id:
                  value:
                    code: 1002
                    message: clientId 不能为空
                missing_file:
                  value:
                    code: 1002
                    message: 缺少导入文件字段 file
