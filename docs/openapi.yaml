          type: string
          description: Client 对外宣告给 Node 的 Docker API 入口
          example: http://192.168.10.220:2375
        dockerVersion:
          type: string
          description: 从 Client `device-info` 探测到的 Docker Engine 版本
          example: "27.5.1"
