  /api/v1/browser-envs/{envId}/run:
    post:
      tags: [BrowserEnvs]
      summary: Run browser env from Node Server (SSE task)
      description: |
        SSE 任务化接口。立即返回 JSON `taskId/eventsUrl`，后台先执行中心 run admission，
        再把显式 `slotId` 透传给目标 Edge run，并由中心继续收口最终成功或失败。

        这条接口当前负责：
        - 读取 `server_browser_envs` 聚合记录
        - 执行统一中心 run admission
        - 显式透传 `slotId` 到目标 Client
        - 创建 `server_tasks`
        - 通过中心 SSE 收口 Edge run 过程和终态

        关键规则：
        - 当前必须显式传 `slotId`
        - Node Server 不自动选 slot

        这条接口不是同步最终结果接口。调用方必须继续订阅
        `/api/v1/server-tasks/{taskId}/events`，观察 `task.progress`、`task.completed`、
        `task.failed` 事件，才能确认本次 run 的最终结论。
      parameters:
        - $ref: '#/components/parameters/EnvID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunBrowserEnvRequest'
            examples:
              default:
                value:
                  slotId: slot001
                  forceRecreate: false
      responses:
        '200':
          description: Task accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiResponseTaskAccepted'
                  - $ref: '#/components/schemas/ApiErrorResponse'
              examples:
