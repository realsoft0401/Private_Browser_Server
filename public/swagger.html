<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Browser Server Control API</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f6f7f9;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      // Node Server 文档在联调时会频繁热更新；这里按页面加载时间追加一次查询串，
      // 避免浏览器继续复用旧的 openapi.yaml 缓存。
      function openapiSpecURL() {
        var specURL = new URL("/openapi.yaml", window.location.origin);
        specURL.searchParams.set("t", String(Date.now()));
        return specURL.toString();
      }

      function bootSwagger() {
        window.ui = SwaggerUIBundle({
          url: openapiSpecURL(),
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis],
          layout: "BaseLayout"
        });
      }

      window.addEventListener("load", bootSwagger);
    </script>
  </body>
</html>
